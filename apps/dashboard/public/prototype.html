<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Pythoneer Wrangler | DFW Pythoneers</title>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <header class="border-b border-slate-800 p-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-yellow-500 bg-clip-text text-transparent">
                PYTHONEER WRANGLER
            </h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest">Hardware Control Dashboard</p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="text-right">
                <span class="block text-xs text-slate-500">FPS</span>
                <span class="font-mono text-green-400" id="fps-counter">60.2</span>
            </div>
            <button id="emergency-off" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-full font-bold text-sm transition-all transform active:scale-95">
                EMERGENCY OFF
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-8">
        
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-sm font-semibold text-slate-400 mb-4 uppercase">Master Brightness</h2>
                <input type="range" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <div class="flex justify-between text-xs mt-2 text-slate-500">
                    <span>0%</span><span>50%</span><span>100%</span>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-sm font-semibold text-slate-400 mb-4 uppercase">Pattern Selector</h2>
                <div class="grid grid-cols-2 gap-2">
                    <button class="bg-slate-800 hover:bg-blue-900/40 border border-slate-700 p-3 rounded-xl transition-colors">Matrix Rain</button>
                    <button class="bg-slate-800 hover:bg-blue-900/40 border border-slate-700 p-3 rounded-xl transition-colors">Python Pulse</button>
                    <button class="bg-slate-800 hover:bg-blue-900/40 border border-slate-700 p-3 rounded-xl transition-colors">Plasma</button>
                    <button class="bg-slate-800 hover:bg-blue-900/40 border border-slate-700 p-3 rounded-xl transition-colors">Rainbow</button>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-sm font-semibold text-slate-400 mb-4 uppercase">Live Text Ticker</h2>
            <div class="flex gap-2">
                <input type="text" placeholder="Type a message for the panel..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all">SEND</button>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button class="bg-orange-600/20 border border-orange-500/50 text-orange-400 p-4 rounded-2xl hover:bg-orange-600/30 transition-all group">
                <span class="block text-2xl mb-1 group-hover:scale-110 transition-transform">🍕</span>
                <span class="font-bold">PIZZA ALERT</span>
            </button>
            <button class="bg-purple-600/20 border border-purple-500/50 text-purple-400 p-4 rounded-2xl hover:bg-purple-600/30 transition-all group">
                <span class="block text-2xl mb-1 group-hover:rotate-12 transition-transform">🎟️</span>
                <span class="font-bold">RAFFLE MODE</span>
            </button>
            <button class="bg-green-600/20 border border-green-500/50 text-green-400 p-4 rounded-2xl hover:bg-green-600/30 transition-all group">
                <span class="block text-2xl mb-1 group-hover:animate-pulse">⏳</span>
                <span class="font-bold">SPEAKER TIMER</span>
            </button>
        </section>

        <section class="bg-black rounded-xl p-4 border border-slate-800 font-mono text-xs text-blue-400 overflow-hidden h-32">
            <div id="console-logs">
                <div class="opacity-50">[INFO] WebSocket connected: Client 127.0.0.1</div>
                <div class="opacity-70">[INFO] Pattern changed: Matrix Rain</div>
                <div class="animate-pulse">[SYSTEM] Hardware Temp: 42°C</div>
            </div>
            <div class="text-white">> _</div>
        </section>

    </main>

    <script>
        // WebSocket Listener for Pythoneer Wrangler 2.0
        const ws = new WebSocket(`ws://${window.location.host}/ws/dashboard`);
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === 'telemetry') {
                document.getElementById('fps-counter').innerText = msg.data.fps.toFixed(1);
                // Update other telemetry as needed
            }
            
            if (msg.type === 'log') {
                const logContainer = document.getElementById('console-logs');
                const newLog = document.createElement('div');
                newLog.className = msg.level === 'SYSTEM' ? 'animate-pulse' : 'opacity-70';
                newLog.innerText = `[${msg.level}] ${msg.message}`;
                logContainer.appendChild(newLog);
                
                // Keep only last 5 logs
                while (logContainer.children.length > 5) {
                    logContainer.removeChild(logContainer.firstChild);
                }
            }
        };

        ws.onopen = () => console.log('Connected to Wrangler Dashboard WS');
        ws.onclose = () => console.log('Disconnected from Wrangler Dashboard WS');
    </script>
</body>
</html>
